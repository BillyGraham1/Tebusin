<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SacBag</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    #root {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      background: #f8f9fa;
      position: relative;
      overflow: hidden;
    }

    /* ===== GLOBAL ===== */
    .screen {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f8f9fa;
    }

    /* ===== SPLASH ===== */
    .splash {
      background: linear-gradient(145deg, #2d6a4f, #40916c);
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .splash-logo {
      font-size: 64px;
    }

    .splash-title {
      font-size: 36px;
      font-weight: 800;
      color: white;
      letter-spacing: 1px;
    }

    .splash-tagline {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      text-align: center;
      padding: 0 32px;
    }

    .splash-btn {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      padding: 0 32px;
    }

    .btn-primary {
      background: white;
      color: #2d6a4f;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

    .btn-secondary {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .btn-secondary:active { transform: scale(0.97); }

    /* ===== HEADER ===== */
    .header {
      padding: 52px 20px 16px;
      background: white;
      box-shadow: 0 1px 0 #e9ecef;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 24px;
      font-weight: 800;
      color: #1b4332;
    }

    .header-sub {
      font-size: 13px;
      color: #6c757d;
      margin-top: 2px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #40916c, #2d6a4f);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    /* ===== CUSTOMER HOME ===== */
    .search-bar {
      margin: 16px 20px;
      background: white;
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .search-bar input {
      border: none;
      outline: none;
      font-size: 14px;
      color: #495057;
      width: 100%;
      background: transparent;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #212529;
      padding: 0 20px;
      margin-bottom: 12px;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      padding: 0 20px;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tag-row::-webkit-scrollbar { display: none; }

    .tag {
      background: white;
      border: 1.5px solid #dee2e6;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #495057;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag.active {
      background: #2d6a4f;
      border-color: #2d6a4f;
      color: white;
    }

    .store-list {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 100px;
    }

    .store-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: transform 0.15s;
    }

    .store-card:active { transform: scale(0.98); }

    .store-card-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
    }

    .store-card-body {
      padding: 14px;
    }

    .store-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .store-name {
      font-size: 16px;
      font-weight: 700;
      color: #212529;
    }

    .store-category {
      font-size: 11px;
      color: #6c757d;
      margin-top: 2px;
    }

    .badge-stock {
      background: #d8f3dc;
      color: #1b4332;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .store-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .price-range {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .price-original {
      font-size: 12px;
      color: #adb5bd;
      text-decoration: line-through;
    }

    .price-discounted {
      font-size: 18px;
      font-weight: 800;
      color: #2d6a4f;
    }

    .store-meta {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #6c757d;
    }

    /* ===== CHECKOUT ===== */
    .checkout-screen {
      background: #f8f9fa;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .checkout-hero {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      background: white;
    }

    .checkout-body {
      padding: 20px;
    }

    .checkout-store-name {
      font-size: 22px;
      font-weight: 800;
      color: #212529;
    }

    .checkout-category {
      font-size: 13px;
      color: #6c757d;
      margin-top: 2px;
    }

    .divider {
      height: 1px;
      background: #e9ecef;
      margin: 16px 0;
    }

    .bag-detail-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .bag-label {
      font-size: 13px;
      font-weight: 600;
      color: #6c757d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .bag-value-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .bag-value-row:last-child { margin-bottom: 0; }

    .bag-value-label {
      font-size: 14px;
      color: #495057;
    }

    .bag-value {
      font-size: 14px;
      font-weight: 600;
      color: #212529;
    }

    .bag-value.green { color: #2d6a4f; }
    .bag-value.strike {
      text-decoration: line-through;
      color: #adb5bd;
      font-weight: 400;
    }

    .discount-badge {
      background: #2d6a4f;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .whats-inside {
      background: #d8f3dc;
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 14px;
    }

    .whats-inside-title {
      font-size: 12px;
      font-weight: 700;
      color: #1b4332;
      margin-bottom: 6px;
    }

    .whats-inside-text {
      font-size: 13px;
      color: #2d6a4f;
    }

    .qty-picker {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
      justify-content: center;
    }

    .qty-btn {
      width: 40px;
      height: 40px;
      background: #e9ecef;
      border: none;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      font-weight: 700;
      color: #212529;
      transition: background 0.15s;
    }

    .qty-btn:active { background: #dee2e6; }
    .qty-btn.green { background: #2d6a4f; color: white; }

    .qty-num {
      font-size: 24px;
      font-weight: 800;
      color: #212529;
      min-width: 32px;
      text-align: center;
    }

    .total-bar {
      background: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      position: sticky;
      bottom: 0;
    }

    .total-label { font-size: 13px; color: #6c757d; }
    .total-price { font-size: 22px; font-weight: 800; color: #2d6a4f; }

    .btn-buy {
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    .btn-buy:active { transform: scale(0.97); opacity: 0.9; }

    /* ===== QR CODE ===== */
    .qr-screen {
      background: #f8f9fa;
      align-items: center;
    }

    .qr-header {
      width: 100%;
      padding: 52px 20px 16px;
      background: white;
      box-shadow: 0 1px 0 #e9ecef;
    }

    .qr-title {
      font-size: 22px;
      font-weight: 800;
      color: #1b4332;
      text-align: center;
    }

    .qr-subtitle {
      font-size: 13px;
      color: #6c757d;
      text-align: center;
      margin-top: 4px;
    }

    .qr-card {
      background: white;
      border-radius: 24px;
      padding: 28px 24px;
      margin: 24px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: calc(100% - 40px);
    }

    .qr-store-name {
      font-size: 18px;
      font-weight: 700;
      color: #212529;
      text-align: center;
    }

    .qr-canvas-wrapper {
      background: white;
      padding: 12px;
      border-radius: 16px;
      border: 2px solid #e9ecef;
    }

    .qr-canvas-wrapper canvas {
      display: block;
    }

    .pin-section {
      width: 100%;
      background: #f8f9fa;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }

    .pin-label {
      font-size: 12px;
      color: #6c757d;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .pin-number {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 10px;
      color: #2d6a4f;
    }

    .qr-order-info {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .qr-info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }

    .qr-info-label { color: #6c757d; }
    .qr-info-value { font-weight: 600; color: #212529; }

    .qr-instruction {
      background: #d8f3dc;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #1b4332;
      text-align: center;
      margin: 0 20px 32px;
    }

    /* ===== MERCHANT HOME ===== */
    .merchant-screen {
      background: #f8f9fa;
    }

    .merchant-header {
      background: linear-gradient(135deg, #1b4332, #2d6a4f);
      padding: 52px 20px 24px;
      color: white;
    }

    .merchant-hello {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
    }

    .merchant-name {
      font-size: 22px;
      font-weight: 800;
      color: white;
      margin-top: 2px;
    }

    .merchant-stats {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .stat-card {
      flex: 1;
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: white;
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-top: 2px;
    }

    .scan-btn-wrapper {
      padding: 24px 20px 16px;
    }

    .scan-btn {
      width: 100%;
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 22px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(45,106,79,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .scan-btn:active {
      transform: scale(0.97);
      box-shadow: 0 3px 10px rgba(45,106,79,0.3);
    }

    .scan-btn-icon { font-size: 32px; }

    .scan-btn-text {
      font-size: 20px;
      font-weight: 800;
    }

    .scan-btn-sub {
      font-size: 12px;
      opacity: 0.8;
    }

    .active-bag-section {
      padding: 0 20px;
    }

    .bag-management-card {
      background: white;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .bag-mgmt-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .bag-mgmt-title {
      font-size: 16px;
      font-weight: 700;
      color: #212529;
    }

    .edit-link {
      font-size: 13px;
      color: #2d6a4f;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
    }

    .stock-adjuster {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8f9fa;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .stock-label {
      font-size: 14px;
      color: #495057;
    }

    .stock-ctrl {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stock-ctrl button {
      width: 32px;
      height: 32px;
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stock-ctrl span {
      font-size: 20px;
      font-weight: 800;
      color: #212529;
      min-width: 28px;
      text-align: center;
    }

    .recent-transactions {
      padding: 16px 20px;
      padding-bottom: 100px;
    }

    .transaction-item {
      background: white;
      border-radius: 14px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }

    .tx-left {}
    .tx-name { font-size: 14px; font-weight: 600; color: #212529; }
    .tx-time { font-size: 12px; color: #6c757d; margin-top: 2px; }
    .tx-amount { font-size: 16px; font-weight: 800; color: #2d6a4f; }

    /* ===== SCANNER MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
    }

    .modal-sheet {
      background: white;
      width: 100%;
      max-width: 390px;
      border-radius: 28px 28px 0 0;
      padding: 24px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: #dee2e6;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
      color: #212529;
      text-align: center;
      margin-bottom: 6px;
    }

    .modal-sub {
      font-size: 13px;
      color: #6c757d;
      text-align: center;
      margin-bottom: 20px;
    }

    .pin-input-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .pin-box {
      width: 56px;
      height: 64px;
      border: 2px solid #dee2e6;
      border-radius: 14px;
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      color: #2d6a4f;
      outline: none;
      transition: border-color 0.2s;
    }

    .pin-box:focus { border-color: #2d6a4f; }

    .btn-confirm {
      width: 100%;
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity 0.2s;
    }

    .btn-confirm:active { opacity: 0.9; }

    .btn-cancel {
      width: 100%;
      background: #f8f9fa;
      color: #6c757d;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ===== SUCCESS SCREEN ===== */
    .success-screen {
      background: white;
      align-items: center;
      justify-content: center;
    }

    .success-circle {
      width: 120px;
      height: 120px;
      background: #d8f3dc;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      margin-bottom: 24px;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .success-title {
      font-size: 28px;
      font-weight: 800;
      color: #1b4332;
      margin-bottom: 8px;
    }

    .success-subtitle {
      font-size: 15px;
      color: #6c757d;
      text-align: center;
      padding: 0 32px;
      margin-bottom: 32px;
    }

    .success-detail-card {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 20px;
      width: calc(100% - 40px);
      margin-bottom: 32px;
    }

    .success-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .success-row:last-child { margin-bottom: 0; }
    .success-row-label { color: #6c757d; }
    .success-row-value { font-weight: 700; color: #212529; }
    .success-row-value.green { color: #2d6a4f; }

    .btn-done {
      width: calc(100% - 40px);
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 390px;
      background: white;
      border-top: 1px solid #e9ecef;
      display: flex;
      padding: 8px 0 20px;
      z-index: 50;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 6px;
      transition: opacity 0.2s;
    }

    .nav-item:active { opacity: 0.6; }

    .nav-icon { font-size: 22px; }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: #adb5bd;
    }

    .nav-label.active { color: #2d6a4f; }

    .scrollable {
      overflow-y: auto;
      flex: 1;
    }

    .scrollable::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── DATA ────────────────────────────────────────────────────────────
const STORES = [
  {
    id: 1, emoji: "🍩", name: "Donat Madu Pak Budi",
    category: "Bakery & Donat", distance: "0.3 km", rating: "4.8",
    originalPrice: 85000, discountPrice: 29000, stock: 5,
    pickupTime: "19.00 – 21.00",
    hint: "3–5 donat segar berbagai rasa",
    savings: 67,
  },

function QRCanvas({ value }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.QRCode) {
      QRCode.toCanvas(ref.current, value, { width: 200, margin: 1,
        color: { dark: "#1b4332", light: "#ffffff" } }, () => {});
    }
  }, [value]);
  return <canvas ref={ref} />;
}

function MerchantHome({ onScanSuccess }) {
  const [stock, setStock] = useState(8);
  const [showScanner, setShowScanner] = useState(false);
  const [pin, setPin] = useState(["", "", "", ""]);
  const refs = [useRef(), useRef(), useRef(), useRef()];

  const handlePinChange = (i, val) => {
    const cleaned = val.replace(/\D/, "").slice(-1);
    const next = [...pin];
    next[i] = cleaned;
    setPin(next);
    if (cleaned && i < 3) refs[i + 1].current.focus();
  };

  const handleConfirm = () => {
    const code = pin.join("");
    if (code === "4829") {
      setShowScanner(false);
      setPin(["", "", "", ""]);
      setStock(prev => Math.max(0, prev - 1));
      onScanSuccess();
    } else {
      alert("PIN salah! Coba lagi.");
      setPin(["", "", "", ""]);
      refs[0].current.focus();
    }
  };

  const soldToday = 12 - stock;

  return (
    <div className="screen merchant-screen">
      <div className="merchant-header">

            <div className="stat-label">Terjual Hari Ini</div>
          </div>
          <div className="stat-card">
            <div className="stat-number">{fmt(soldToday * 29000).replace("Rp ", "")}</div>
            <div className="stat-label">Pendapatan</div>
          </div>
        </div>
      </div>

      <div className="scrollable">
        <div className="scan-btn-wrapper">
          <button className="scan-btn" onClick={() => setShowScanner(true)}>
            <span className="scan-btn-icon">📷</span>
            <div>
              <div className="scan-btn-text">Scan QR Pembeli</div>
              <div className="scan-btn-sub">Tap untuk verifikasi pembelian</div>
            </div>
          </button>
        </div>

        <div className="active-bag-section">
          <div className="section-title" style={{ padding: 0, marginBottom: 12 }}>📦 Kelola Surprise Bag Hari Ini</div>
          <div className="bag-management-card">

              <div className="bag-mgmt-title">🍩 Surprise Bag Donat</div>
              <button className="edit-link">Edit</button>

            <div className="stock-adjuster">
              <span className="stock-label">Stok tersisa hari ini</span>

                <button onClick={() => setStock(stock + 1)}>+</button>
              </div>
            </div>

            <div className="bag-value-row" style={{ padding: "0 4px" }}>
              <span className="bag-value-label" style={{ fontSize: 13, color: "#6c757d" }}>Harga Bag</span>
              <span className="bag-value" style={{ fontSize: 13, color: "#2d6a4f", fontWeight: 700 }}>Rp 29.000 <span style={{ color: "#adb5bd", textDecoration: "line-through", fontWeight: 400 }}>Rp 85.000</span></span>
            </div>
            <div className="bag-value-row" style={{ padding: "0 4px" }}>
              <span className="bag-value-label" style={{ fontSize: 13, color: "#6c757d" }}>Jam Pickup</span>
              <span className="bag-value" style={{ fontSize: 13 }}>19.00 – 21.00</span>
            </div>
          </div>
        </div>

        <div className="recent-transactions">

      {showScanner && (
        <div className="modal-overlay" onClick={(e) => { if (e.target.className === "modal-overlay") { setShowScanner(false); setPin(["","","",""]); } }}>
          <div className="modal-sheet">

            <div className="pin-input-row">

                <input

// ─── APP ─────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("splash");
  const [mode, setMode] = useState(null);
  const [selectedStore, setSelectedStore] = useState(null);
  const [orderQty, setOrderQty] = useState(1);
  const [orderTotal, setOrderTotal] = useState(0);

  const goCustomer = () => { setMode("customer"); setScreen("customerHome"); };
  const goMerchant = () => { setMode("merchant"); setScreen("merchantHome"); };

  const handleSelectStore = (store) => {
    setSelectedStore(store);
    setScreen("checkout");
  };

  const handlePay = (store, qty, total) => {
    setOrderQty(qty);
    setOrderTotal(total);
    setScreen("qr");
  };

  const handleScanSuccess = () => setScreen("merchantSuccess");

  return (
    <div style={{ position: "relative" }}>
      {screen === "splash" && <SplashScreen onCustomer={goCustomer} onMerchant={goMerchant} />}
      {screen === "customerHome" && <CustomerHome onSelectStore={handleSelectStore} />}
      {screen === "checkout" && <CheckoutScreen store={selectedStore} onBack={() => setScreen("customerHome")} onPay={handlePay} />}
      {screen === "qr" && <QRScreen store={selectedStore} qty={orderQty} total={orderTotal} onBack={() => setScreen("checkout")} />}
      {screen === "merchantHome" && <MerchantHome onScanSuccess={handleScanSuccess} />}
      {screen === "merchantSuccess" && <SuccessScreen onDone={() => setScreen("merchantHome")} />}

      {(screen === "customerHome" || screen === "checkout" || screen === "qr") && (
        <div className="bottom-nav">
          <div className="nav-item" onClick={() => setScreen("customerHome")}>
            <span className="nav-icon">🏠</span>
            <span className={`nav-label ${screen === "customerHome" ? "active" : ""}`}>Home</span>
          </div>
          <div className="nav-item">
            <span className="nav-icon">🎁</span>
            <span className="nav-label">Pesananku</span>
          </div>
          <div className="nav-item">
            <span className="nav-icon">🌱</span>
            <span className="nav-label">Dampak</span>
          </div>
          <div className="nav-item">
            <span className="nav-icon">👤</span>
            <span className="nav-label">Profil</span>
          </div>
        </div>
      )}

      {(screen === "merchantHome" || screen === "merchantSuccess") && (
        <div className="bottom-nav">
          <div className="nav-item">
            <span className="nav-icon">🏠</span>
            <span className={`nav-label ${screen === "merchantHome" ? "active" : ""}`}>Dashboard</span>
          </div>
          <div className="nav-item">
            <span className="nav-icon">📦</span>
            <span className="nav-label">Bag Saya</span>
          </div>
          <div className="nav-item">
            <span className="nav-icon">📊</span>
            <span className="nav-label">Statistik</span>
          </div>
          <div className="nav-item" onClick={() => setScreen("splash")}>
            <span className="nav-icon">⚙️</span>
            <span className="nav-label">Keluar</span>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
